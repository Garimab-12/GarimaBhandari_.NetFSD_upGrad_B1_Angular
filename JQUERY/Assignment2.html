<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Todo List</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }

        li {
            margin: 10px;
            list-style: none;
        }

        .deleteBtn {
            background-color: red;
            color: white;
            border: none;
            padding: 4px 8px;
        }
    </style>
</head>

<body>

    <h2>My Todo List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button id="addBtn">Add Task</button>
    <button id="clearBtn">Clear All</button>

    <ul id="taskList"></ul>

<script>
$(document).ready(function(){

    $("#addBtn").click(function(){

        let task = $("#taskInput").val();

        if(task !== ""){
            $("#taskList").append(
                "<li>" + task + 
                " <button class='deleteBtn'>Delete</button></li>"
            );

            $("#taskInput").val(""); 
        }
    });

    $(document).on("click", ".deleteBtn", function(){
        $(this).parent().remove();
    });

    $("#clearBtn").click(function(){
        $("#taskList").html("");
    });

});
</script>

</body>
</html>

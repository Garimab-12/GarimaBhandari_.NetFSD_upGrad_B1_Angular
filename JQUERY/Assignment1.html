<!DOCTYPE html>
<html>
<head>
    <title>jQuery Selectors Practice</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
$(document).ready(function(){

    // 1. Select all <p> elements and change text color to blue
    $("p").css("color", "blue");

    // 2. Select element by ID and change background color
    $("#heading").css("background-color", "yellow");

    // 3. Select elements by class and add border
    $(".box").css("border", "2px solid red");

    // 4. Select first and last list items
    $("li:first").css("color", "green");
    $("li:last").css("color", "orange");

    // 5. Hide all even rows in a table
    $("tr:even").hide();

});
</script>
</head>
<body>

    <h2 id="heading">Welcome</h2>

    <p>This is paragraph 1</p>
    <p>This is paragraph 2</p>

    <div class="box">Box 1</div>
    <div class="box">Box 2</div>

    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
    </ul>

    <table border="1">
        <tr><td>Row 1</td></tr>
        <tr><td>Row 2</td></tr>
        <tr><td>Row 3</td></tr>
        <tr><td>Row 4</td></tr>
    </table>

</body>
</html>
